kind = "web"
previewPath = "/"
title = "Citizen Vigilante ($VIG)"
version = "1.0.0"
id = "artifacts/vig-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25980

[services.development]
run = "pnpm --filter @workspace/vig-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vig-website", "run", "build" ]
publicDir = "artifacts/vig-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25980"
BASE_PATH = "/"
